services:
  django:
    build: .
    container_name: privai-django
    ports:
      - "8000:8000"
    volumes:
      - sqlite_data:/app/backend
      - media_data:/app/backend/media
      - chroma_data:/app/backend/chroma_db
    env_file:
      - .env
    command: gunicorn privai_django.wsgi:application --bind 0.0.0.0:8000 --workers 4

  vector-engine:
    build: .
    container_name: privai-vector
    ports:
      - "8001:8001"
    volumes:
      - chroma_data:/app/backend/chroma_db
    env_file:
      - backend/vector_engine/.env
    working_dir: /app/backend/vector_engine
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001

volumes:
  sqlite_data:
  media_data:
  chroma_data:
