{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5 mb-5 align-items-center" style="min-height: 60vh;">
    <div class="col-md-6 col-lg-4">
        <div class="card glass-panel shadow-lg border-0" style="border-radius: 1.5rem;">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <div class="d-inline-block p-3 rounded-circle bg-primary bg-opacity-10 mb-3">
                        <i class="bi bi-person-fill-lock fs-1 text-primary"></i>
                    </div>
                    <h3 class="fw-bolder text-gradient">Welcome Back</h3>
                    <p class="text-muted small">Access your private document vault</p>
                </div>
                <form id="loginForm">
                    <div class="mb-3">
                        <label class="form-label text-muted small fw-bold ms-1">Email Address</label>
                        <input type="email" class="form-control form-control-lg bg-light" id="email" required placeholder="you@example.com">
                    </div>
                    <div class="mb-4">
                        <label class="form-label text-muted small fw-bold ms-1">Password</label>
                        <input type="password" class="form-control form-control-lg bg-light" id="password" required placeholder="••••••••">
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg w-100 rounded-pill shadow-sm">Sign In <i class="bi bi-arrow-right ms-1"></i></button>
                </form>
                <div class="text-center mt-4 pt-3 border-top">
                    <p class="text-muted small mb-0">Don't have an account? <a href="/register/" class="text-decoration-none fw-bold">Create one</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const data = await api.login(
        document.getElementById('email').value,
        document.getElementById('password').value
    );
    if (data) window.location.href = '/documents/';
});
</script>
{% endblock %}
