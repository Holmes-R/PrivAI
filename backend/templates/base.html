<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrivAI - {% block title %}Private Document RAG{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="/static/css/style.css" rel="stylesheet">
</head>
<body class="">
    <div class="container mt-3 mb-5">
        <nav class="navbar navbar-expand-lg glass-nav rounded-4 px-4 py-2 mb-4 d-flex align-items-center">
            <a class="navbar-brand fw-bold text-gradient" href="/">
                <i class="bi bi-shield-lock-fill me-2"></i>PrivAI
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto" id="navLinks">
                    <li class="nav-item"><a class="nav-link" href="/documents/"><i class="bi bi-files me-1"></i>Documents</a></li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <button class="nav-link btn btn-link" id="darkModeToggle" onclick="toggleDarkMode()" title="Toggle dark mode">
                            <i class="bi bi-moon-fill"></i>
                        </button>
                    </li>
                </ul>
                <ul class="navbar-nav" id="authNav">
                </ul>
            </div>
        </nav>
    </div>

    <div class="container">
        <div id="alerts"></div>
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/app.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
