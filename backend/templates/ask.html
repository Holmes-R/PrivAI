{% extends "base.html" %}
{% block title %}Ask Questions{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <h3 class="mb-4"><i class="bi bi-question-circle me-2"></i>Ask Your Documents</h3>
        <div class="card shadow-sm mb-4">
            <div class="card-body">
                <form id="askForm">
                    <div class="mb-3">
                        <textarea class="form-control" id="question" rows="3" placeholder="Ask a question based on your documents..." required></textarea>
                    </div>
                    <button type="submit" class="btn btn-success">
                        <i class="bi bi-send me-1"></i>Ask
                    </button>
                </form>
            </div>
        </div>
        <div id="answerSection" class="d-none">
            <div class="card shadow-sm mb-4">
                <div class="card-body">
                    <h6 class="text-muted mb-2">Answer:</h6>
                    <p id="answerText" class="fs-5"></p>
                </div>
            </div>
            <div class="card shadow-sm mb-4">
                <div class="card-header">
                    <h6 class="mb-0">Sources</h6>
                </div>
                <div class="card-body" id="sourcesList"></div>
            </div>
        </div>
        <div id="loadingAnswer" class="text-center d-none">
            <div class="spinner-border text-success mb-2" role="status"></div>
            <p class="text-muted">Searching your documents...</p>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
if (!api.isAuthenticated()) { window.location.href = '/login/'; }

document.getElementById('askForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const question = document.getElementById('question').value;
    document.getElementById('answerSection').classList.add('d-none');
    document.getElementById('loadingAnswer').classList.remove('d-none');

    const data = await api.request('/api/documents/ask/', 'POST', {
        question: question,
        n_results: 5
    });

    document.getElementById('loadingAnswer').classList.add('d-none');
    if (!data) { showAlert('Failed to get answer. Try logging in again.', 'warning'); return; }

    document.getElementById('answerText').textContent = data.answer;
    document.getElementById('sourcesList').innerHTML = data.sources.map(s => `
        <div class="mb-2 p-2 bg-light rounded">
            <small class="text-muted">${s.title} (score: ${s.score})</small>
            <p class="mb-0 small">${s.text.substring(0, 200)}...</p>
        </div>
    `).join('');
    document.getElementById('answerSection').classList.remove('d-none');
});
</script>
{% endblock %}
